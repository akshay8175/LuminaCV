<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B21B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circles for glow effect -->
  <circle cx="16" cy="16" r="15" fill="url(#grad1)" opacity="0.15" filter="url(#glow)"/>
  
  <!-- Main document shape -->
  <g>
    <!-- Document body -->
    <rect x="6" y="4" width="20" height="24" rx="2" fill="url(#grad1)" filter="url(#glow)"/>
    
    <!-- White content area inside document -->
    <rect x="8" y="6" width="16" height="20" rx="1.5" fill="white"/>
    
    <!-- Decorative lines (representing text on CV) -->
    <line x1="10" y1="9" x2="22" y2="9" stroke="url(#grad1)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="10" y1="13" x2="20" y2="13" stroke="#D1D5DB" stroke-width="1" stroke-linecap="round"/>
    <line x1="10" y1="14.5" x2="19" y2="14.5" stroke="#D1D5DB" stroke-width="1" stroke-linecap="round"/>
    <line x1="10" y1="17" x2="22" y2="17" stroke="#D1D5DB" stroke-width="1" stroke-linecap="round"/>
    <line x1="10" y1="18.5" x2="20" y2="18.5" stroke="#D1D5DB" stroke-width="1" stroke-linecap="round"/>
    <line x1="10" y1="21" x2="22" y2="21" stroke="#D1D5DB" stroke-width="1" stroke-linecap="round"/>
    <line x1="10" y1="22.5" x2="18" y2="22.5" stroke="#D1D5DB" stroke-width="1" stroke-linecap="round"/>
    
    <!-- Small accent dot (representing focus/highlight) -->
    <circle cx="24.5" cy="6.5" r="1.5" fill="url(#grad1)" filter="url(#glow)"/>
  </g>
  
  <!-- Corner accent for "Lumina" concept -->
  <path d="M 26 4 Q 28 6 26 8" stroke="url(#grad1)" stroke-width="1.5" fill="none" stroke-linecap="round" filter="url(#glow)"/>
</svg>